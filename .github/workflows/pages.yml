name: GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Clone repo
      run: |
        git clone --depth 1 --no-tags https://codeberg.org/mikf/gallery-dl.git .

    - uses: actions/configure-pages@v6

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.14"

    - name: Install Docutils
      run: pip install docutils pygments

    - name: Update Links
      working-directory: ./docs/
      run: sed --in-place '/https:/! s/\.\(rst\|md\)\b/.html/g' -- *.md  *.rst

    - name: reStructuredText to HTML
      working-directory: ./docs/
      run: |
        while read -r RST
        do
          HTML="${RST%.rst}.html"
          python -m docutils --writer=html5 --output="$HTML" -- "$RST"
          sed --in-place '/<\/head>/i <script src="links.js"></script>' -- "$HTML"
        done < <(find . -type f -name "*.rst")

    - uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697  # v1.0.13
      with:
        source: ./docs/
        destination: ./_site/

    - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0

  deploy:

    runs-on: ubuntu-latest

    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
      id: deployment
